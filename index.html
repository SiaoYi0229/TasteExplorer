<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TasteExplorer - 美食探索</title>
    <style>
        /* --- 核心樣式 100% 還原，絕不改動 --- */
        :root {
            --primary-orange: #FF6600;
            --glass-bg: rgba(25, 25, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --label-color: #cccccc;
            --accent-yellow: #FFCC00;
        }
        html, body { overscroll-behavior-y: none; height: 100%; overflow: hidden; position: fixed; width: 100%; margin: 0; padding: 0; background-color: #000; }
        html { font-size: 14px; } 
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif; }
        body { color: #fff; display: flex; align-items: center; justify-content: center; }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bg-slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1s; }
        .bg-slide.active { opacity: 0.6; }
        #api-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .api-card { width: 100%; max-width: 340px; background: rgba(20, 20, 20, 0.8); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .api-input { width: 100%; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; color: white; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        .api-save-btn { width: 100%; background: var(--primary-orange); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .container { width: 95%; max-width: 357px; height: 100dvh; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; align-items: center; transition: 0.5s; padding: 20px 0; position: relative; }
        .container.blur-mode { filter: blur(15px) brightness(0.4); transform: scale(0.95); pointer-events: none; }
        .header { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        .logo { font-size: 2.77rem; font-weight: 800; color: var(--primary-orange); line-height: 1.2; letter-spacing: -1px; }
        .tagline { font-size: 1.2rem; color: #ffffff; opacity: 0.8; margin-top: 6px; }
        .settings-btn { position: absolute; top: 10px; right: 0; font-size: 24px; cursor: pointer; opacity: 0.8; color: white; padding: 10px; }
        .glass-card { width: 100%; background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; padding: 18px; border: 1px solid var(--glass-border); text-align: left; flex-shrink: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.75rem; color: #ffffff; margin-bottom: 4px; display: block; font-weight: 600; }
        .input-box { background: var(--input-bg); border-radius: 10px; height: 38px; display: flex; align-items: center; padding: 0 10px; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary-orange); box-shadow: 0 0 8px rgba(255, 102, 0, 0.3); }
        select { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 0.85rem; appearance: none; -webkit-appearance: none; cursor: pointer; }
        select option { background-color: #222; }
        .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
        .toggle-btn { background: var(--input-bg); height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; font-size: 0.85rem; transition: 0.3s; user-select: none; }
        .toggle-btn.selected { background: rgba(255,102,0,0.2); border-color: var(--primary-orange); color: var(--primary-orange); font-weight: bold; }
        #btn-open.selected { background: rgba(46,204,113,0.15); border-color: #2ecc71; color: #2ecc71; }
        .footer-action { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cta-button { width: 100%; background: linear-gradient(180deg, #FF8533, #FF6600); border: none; padding: 16px; font-weight: 700; border-radius: 16px; color: #fff; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4); transition: 0.3s; }
        .cta-button:disabled { background: #555555 !important; cursor: not-allowed; box-shadow: none; color: #aaaaaa; }
        .usage-hint { font-size: 0.85rem; margin-top: 10px; opacity: 0.7; color: #ffffff; font-weight: 500; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; background: none; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,102,0,0.1); border-top-color: var(--primary-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #swiper-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; flex-direction: column; align-items: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .card-stack { width: 100%; max-width: 340px; height: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; overflow-x: hidden; padding: 20px 0 120px 0; gap: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .swipe-card-wrapper { width: 92%; flex-shrink: 0; transition: transform 0.4s ease, opacity 0.4s ease; touch-action: pan-y; position: relative; }
        .swipe-card { width: 100%; background: var(--glass-bg); border-radius: 24px; border: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .swipe-label { position: absolute; top: 30px; padding: 5px 15px; border: 4px solid; border-radius: 10px; font-size: 2rem; font-weight: 900; text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 10; }
        .label-like { right: 20px; color: #2ecc71; border-color: #2ecc71; transform: rotate(15deg); }
        .label-nope { left: 20px; color: #e74c3c; border-color: #e74c3c; transform: rotate(-15deg); }
        .label-chosen { position: absolute; top: 20px; left: 20px; padding: 5px 15px; border: 4px solid #2ecc71; color: #2ecc71; border-radius: 10px; font-size: 1.8rem; font-weight: 900; opacity: 0; pointer-events: none; z-index: 20; transform: scale(5); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4); background: rgba(0,0,0,0.3); }
        .label-chosen.active { opacity: 1; transform: scale(1) rotate(-15deg); }
        .swipe-card h3 { color: var(--primary-orange); font-size: 1.4rem; font-weight: 800; }
        .card-badges { display: flex; gap: 6px; }
        .card-badge { padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .badge-rating { background: var(--accent-yellow); color: #000; }
        .badge-price { background: rgba(255,255,255,0.1); color: #eee; }
        .info-row { font-size: 0.85rem; display: flex; gap: 6px; color: #ddd; line-height: 1.4; }
        .info-label { color: var(--primary-orange); font-weight: bold; flex-shrink: 0; }
        .card-summary { font-size: 0.88rem; font-style: italic; opacity: 0.85; border-left: 2px solid var(--primary-orange); padding-left: 10px; margin: 5px 0; line-height: 1.4; }
        .card-map-btn { background: var(--primary-orange); color: #fff; text-decoration: none; padding: 12px; border-radius: 14px; text-align: center; font-weight: bold; margin-top: 10px; font-size: 0.95rem; }
        .close-swiper { position: fixed; bottom: 40px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 30px; border-radius: 50px; cursor: pointer; z-index: 120; font-weight: bold; backdrop-filter: blur(10px); }
        #round-info { background: rgba(255, 102, 0, 0.2); border: 1px solid var(--primary-orange); padding: 8px 20px; border-radius: 50px; margin-top: 30px; margin-bottom: 10px; font-weight: bold; z-index: 110; pointer-events: none; }
        
        .swipe-hints { position: absolute; top: 12px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; pointer-events: none; z-index: 5; }
        .hint-item { font-size: 0.65rem; font-weight: bold; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.15); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body touch-action="none">
    <!-- UI 結構完全不動 -->
    <div id="api-overlay"><div class="api-card"><h2>🔑 API 設定</h2><p>請輸入您的 Gemini API Key。<br>設定後享有獨立的每日 15 次配額。</p><input type="password" id="api-key-input" class="api-input" placeholder="貼上您的 API Key (AIza...)"><button class="api-save-btn" onclick="saveApiKey()">確認並儲存</button><a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent-yellow); font-size:0.85rem; display:block; margin-top:15px;">👉 點此申請您的 API Key</a><button onclick="document.getElementById('api-overlay').style.display='none'" style="background:none; border:none; color:#777; margin-top:20px;">返回首頁</button></div></div>
    <div id="bg-container"></div>
    <div class="container" id="main-ui">
        <div class="header"><div class="logo">TasteExplorer</div><div class="settings-btn" onclick="document.getElementById('api-overlay').style.display='flex'">⚙️</div><div class="tagline">探索隱藏美味 享受極致饗宴</div></div>
        <div class="glass-card">
            <div class="form-grid">
                <div class="form-group"><label>📍 縣市</label><div class="input-box"><select id="city" onchange="updateDistricts(); checkTransAvailability();">
                    <optgroup label="北部地區"><option value="Taipei" selected>台北市</option><option value="NewTaipei">新北市</option><option value="Keelung">基隆市</option><option value="Taoyuan">桃園市</option><option value="HsinchuCity">新竹市</option><option value="HsinchuCounty">新竹縣</option><option value="Yilan">宜蘭縣</option></optgroup>
                    <optgroup label="中部地區"><option value="Miaoli">苗栗縣</option><option value="Taichung">台中市</option><option value="Changhua">彰化縣</option><option value="Nantou">南投縣</option><option value="Yunlin">雲林縣</option></optgroup>
                    <optgroup label="南部地區"><option value="ChiayiCity">嘉義市</option><option value="ChiayiCounty">嘉義縣</option><option value="Tainan">台南市</option><option value="Kaohsiung">高雄市</option><option value="Pingtung">屏東縣</option></optgroup>
                    <optgroup label="東部與離島"><option value="Hualien">花蓮縣</option><option value="Taitung">台東縣</option><option value="Penghu">澎湖縣</option><option value="Kinmen">金門縣</option><option value="Lienchiang">連江縣</option></optgroup>
                </select></div></div>
                <div class="form-group"><label>🏙️ 行政區</label><div class="input-box"><select id="district" onchange="checkTransAvailability();"><option>全區</option></select></div></div>
                <div class="form-group full-width"><label>🚆 交通偏好</label><div class="input-box"><select id="transport" onchange="checkTransAvailability()"><option value="none" selected>🤷‍♂️ 不拘</option><option value="mrt">🚇 鄰近捷運站 (步行可達)</option><option value="hsr">🚄 鄰近高鐵站 (步行可達)</option><option value="train">🚂 鄰近火車站 (步行可達)</option><option value="airport">✈️ 鄰近機場 (步行可達)</option></select></div></div>
                <div class="form-group full-width" id="mrt-section" style="display:none;"><label id="trans-label">🚉 指定站點</label><div class="input-box"><select id="mrt-station"></select></div></div>
                <div class="form-group full-width"><label>🤤 想吃什麼？</label><div class="input-box"><select id="food">
                    <option value="all">全部 (什麼都想吃)</option>
                    <optgroup label="🔥 熱門精選"><option value="hotpot">火鍋 / 麻辣鍋 / 涮涮鍋</option><option value="bbq">燒肉 / 日式烤肉 / 韓式烤肉</option><option value="steak">牛排 / 鐵板燒</option><option value="buffet">吃到飽 (Buffet)</option></optgroup>
                    <optgroup label="🍜 台式與中式"><option value="taiwanese_snack">台灣小吃 / 路邊攤</option><option value="beef_noodle">牛肉麵</option><option value="rechao">海鮮熱炒 / 合菜</option><option value="hot_soup">滷味 / 鹽酥雞 / 宵夜</option></optgroup>
                    <optgroup label="🍣 日式料理"><option value="ramen">日式拉麵 / 烏龍麵</option><option value="sushi">壽司 / 生魚片 / 丼飯</option><option value="izakaya">居酒屋 / 串燒</option><option value="curry">日式咖哩 / 定食</option></optgroup>
                    <optgroup label="🌍 異國風味"><option value="korean">韓式料理 / 炸雞</option><option value="thai_viet">泰式 / 越式料理</option><option value="american">美式漢堡 / 炸物</option><option value="italian">義式料理 / 披薩 / 義大利麵</option></optgroup>
                    <optgroup label="☕ 放鬆時刻"><option value="brunch">早午餐 (Brunch)</option><option value="cafe">咖啡廳 / 下午茶 / 甜點</option><option value="bistro">餐酒館 / Bar</option></optgroup>
                    <optgroup label="🥬 其他"><option value="vegetarian">素食 / 蔬食</option><option value="healthy">健康餐盒 / 輕食</option></optgroup>
                </select></div></div>
                <div class="form-group full-width"><label>👥 人數</label><div class="input-box"><select id="people"><option selected>1~2 人</option><option>2~4 人</option><option>4~6 人</option><option>6 人以上</option></select></div></div>
                <div class="form-group full-width"><label>🎯 用餐目的</label><div class="input-box"><select id="purpose"><option>🤷‍♂️ 不拘 (隨意吃吃)</option><option>👯 朋友聚餐 (熱鬧)</option><option>💑 情侶約會 (氣氛)</option><option>👨‍👩‍👧‍👦 家庭聚會 (長輩/小孩)</option><option>🧘 一人獨享 (安靜)</option><option>💼 商務宴請 (正式)</option><option>🌙 宵夜場 (深夜)</option><option>📸 IG打卡/網美店</option><option>⚡ 快速解決 (趕時間)</option><option>🎉 慶生/紀念日</option></select></div></div>
                <div class="form-group full-width"><label>💰 預算範圍</label><div class="input-box"><select id="budget"><option value="low">💵 平價 (&lt;$300)</option><option value="mid">💵💵 中價位 ($300～$800)</option><option value="high">💵💵💵 高級 (&gt;$800)</option><option value="luxury">💎 頂級奢華 (&gt;$2000)</option></select></div></div>
                <div class="form-group full-width"><div class="toggle-row"><div id="btn-hidden" class="toggle-btn" onclick="this.classList.toggle('selected')">🤫 隱藏版</div><div id="btn-open" class="toggle-btn" onclick="this.classList.toggle('selected')">🕒 營業中</div></div></div>
            </div>
        </div>
        <div class="footer-action"><button id="search-btn" class="cta-button" onclick="handleSearchClick()">開始探索美食</button><div id="usage-text" class="usage-hint">今日剩餘次數：-- 次</div></div>
    </div>
    <div id="loader"><div class="spinner"></div><p style="color: white; margin-top: 10px; font-weight: bold;">正在穿梭巷弄中...</p></div>
    <div id="swiper-overlay"><div id="round-info"></div><div class="card-stack" id="card-stack"></div><button class="close-swiper" onclick="resetUI()">← 返回調整</button></div>

    <script>
        /* --- 靜態數據 100% 完整保留 --- */

        function getUsageInfo(userApiKey) {
            if (!userApiKey) return { remaining: 0, limit: DAILY_LIMIT };
            const today = new Date().toLocaleDateString("zh-TW");
            const keyId = "KEY_" + userApiKey.slice(-10);
            const lastDate = localStorage.getItem('DATE_' + keyId);
            let usageCount = parseInt(localStorage.getItem('COUNT_' + keyId) || '0');
            if (lastDate !== today) {
                usageCount = 0;
                localStorage.setItem('DATE_' + keyId, today);
                localStorage.setItem('COUNT_' + keyId, '0');

            return { remaining: Math.max(0, DAILY_LIMIT - usageCount), limit: DAILY_LIMIT };
        }

                const keyId = "KEY_" + userApiKey.slice(-10);
                const newCount = (DAILY_LIMIT - usage.remaining) + 1;
                localStorage.setItem(`COUNT_${keyId}`, newCount.toString());
                return { data: parsedData, newRemaining: DAILY_LIMIT - newCount };
            } catch (e) { return { error: "AI 忙碌中，請稍後再試。" }; }
        }

        /* --- UI 邏輯：優化地圖連結生成 --- */
        const bg = document.getElementById('bg-container'); images.forEach((url, i) => { const div = document.createElement('div'); div.className = 'bg-slide' + (i===0?' active':''); div.style.backgroundImage = `url('${url}?auto=format&fit=crop&w=1200')`; bg.appendChild(div); });
        let slideIdx = 0; setInterval(() => { const s = document.querySelectorAll('.bg-slide'); s[slideIdx].classList.remove('active'); slideIdx = (slideIdx+1)%s.length; s[slideIdx].classList.add('active'); }, 6000);

        function updateDistricts() { const city = document.getElementById('city').value; const distSelect = document.getElementById('district'); distSelect.innerHTML = cityData[city].map(d => `<option value="${d}">${d}</option>`).join(''); }
        updateDistricts();

        function checkTransAvailability() {
            const city = document.getElementById('city').value;
            const district = document.getElementById('district').value;
            const transport = document.getElementById('transport').value;
            const mrtSec = document.getElementById('mrt-section');
            const mrtSel = document.getElementById('mrt-station');
            const label = document.getElementById('trans-label');
            if (transport === 'none') { mrtSec.style.display = 'none'; return; }
            mrtSec.style.display = 'block';
            if (transport === 'mrt') {
                label.innerText = "🚇 指定捷運站 (依線路分類)";
                let linesData = (city === 'Taipei' ? mrtLinesTaipei : (city === 'NewTaipei' ? mrtLinesNewTaipei : (city === 'Taoyuan' ? mrtLinesTaoyuan : (city === 'Taichung' ? mrtLinesTaichung : (city === 'Kaohsiung' ? mrtLinesKaohsiung : null)))));
                if (district === '全區' && linesData) {
                    let html = '<option value="">--- 請選擇捷運站 ---</option>';
                    for (const line in linesData) { html += `<optgroup label="${line}">`; linesData[line].forEach(s => html += `<option value="${s}">${s}站</option>`); html += `</optgroup>`; }
                    mrtSel.innerHTML = html;
                } else if (mrtMap[city] && mrtMap[city][district]) {
                    mrtSel.innerHTML = '<option value="">--- 請選擇 ---</option>' + mrtMap[city][district].map(s => `<option value="${s}">${s}站</option>`).join('');
                } else { mrtSel.innerHTML = '<option value="">該區暫無捷運站</option>'; }
            } else {
                let currentMap = (transport === 'train' ? trainMap : (transport === 'hsr' ? hsrMap : airportMap));
                label.innerText = `🚉 指定${transport === 'train' ? '火車' : (transport === 'hsr' ? '高鐵' : '機場')}站`;
                if (currentMap[city]) {
                    let list = (district === '全區' ? Object.values(currentMap[city]).flat() : (currentMap[city][district] || []));
                    list = [...new Set(list)].sort();
                    mrtSel.innerHTML = '<option value="">--- 請選擇 ---</option>' + list.map(s => `<option value="${s}">${s}${s.includes('機場')?'':'站'}</option>`).join('');
                } else { mrtSel.innerHTML = '<option value="">該區暫無站點</option>'; }
            }
        }

        function saveApiKey() { const key = document.getElementById('api-key-input').value.trim(); if (!key) { alert("請輸入有效 Key！"); return; } localStorage.setItem('EXPLORER_FINAL_SECURE_KEY', key); document.getElementById('api-overlay').style.display = 'none'; refreshUsage(); }
        function getStoredKey() { return localStorage.getItem('EXPLORER_FINAL_SECURE_KEY') || ""; }
        function refreshUsage() { const key = getStoredKey(); const usage = getUsageInfo(key); updateUsageDisplay(usage.remaining); }
        window.onload = function() { const saved = getStoredKey(); if (saved) { document.getElementById('api-key-input').value = saved; refreshUsage(); } };
        function updateUsageDisplay(count) { document.getElementById('usage-text').innerText = `今日剩餘次數：${count} 次`; const btn = document.getElementById('search-btn'); if(count <= 0) { btn.disabled = true; btn.innerText = "額度已滿"; } else { btn.disabled = false; btn.innerText = "開始探索美食"; } }

        let currentLikedList = []; let cardsRemaining = 0; let swipedCount = 0; let roundCounter = 1;
        function handleSearchClick() { if (!getStoredKey()) { document.getElementById('api-overlay').style.display = 'flex'; return; } startSearch(); }

        async function startSearch() {
            const cityKey = document.getElementById('city').value;
            const cityName = document.getElementById('city').options[document.getElementById('city').selectedIndex].text;
            const transport = document.getElementById('transport').value;
            const btn = document.getElementById('search-btn');
            const loader = document.getElementById('loader');
            
            const hasMRT = ['Taipei', 'NewTaipei', 'Taoyuan', 'Taichung', 'Kaohsiung'];
            const hasHSR = ['Taipei', 'NewTaipei', 'Taoyuan', 'HsinchuCounty', 'Miaoli', 'Taichung', 'Changhua', 'Yunlin', 'ChiayiCounty', 'Tainan', 'Kaohsiung'];
            const hasAirport = ['Taipei', 'Taoyuan', 'Taichung', 'Tainan', 'Kaohsiung', 'ChiayiCounty', 'Hualien', 'Taitung', 'Penghu', 'Kinmen', 'Lienchiang'];
            
            if (transport === 'mrt' && !hasMRT.includes(cityKey)) { alert(`⚠️ ${cityName} 目前沒有捷運。`); return; }
            if (transport === 'hsr' && !hasHSR.includes(cityKey)) { alert(`⚠️ ${cityName} 目前沒有高鐵。`); return; }
            if (transport === 'airport' && !hasAirport.includes(cityKey)) { alert(`⚠️ ${cityName} 目前沒有機場。`); return; }

            btn.disabled = true; btn.innerText = "搜尋中..."; loader.style.display = 'flex';
            const now = new Date(); const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const userTimeString = `${days[now.getDay()]} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const data = { userApiKey: getStoredKey(), city: cityName, district: document.getElementById('district').value, food: document.getElementById('food').options[document.getElementById('food').selectedIndex].text, purpose: document.getElementById('purpose').options[document.getElementById('purpose').selectedIndex].text, budget: document.getElementById('budget').options[document.getElementById('budget').selectedIndex].text, people: document.getElementById('people').value, userTime: userTimeString, mrtStation: document.getElementById('mrt-station').value, filters: (document.getElementById('btn-hidden').classList.contains('selected') ? "隱藏版 " : "") + (document.getElementById('btn-open').classList.contains('selected') ? "營業中 " : "") + (document.getElementById('transport').options[document.getElementById('transport').selectedIndex].text) };

            const res = await getAiRecommendation(data);
            loader.style.display = 'none'; btn.disabled = false; btn.innerText = "開始探索美食"; 
            if(res.error) { alert(res.error); return; } 
            if(!res.data || res.data.length === 0) { alert("🔍 找不到符合要求的店家，請更換站點或放寬條件！"); resetUI(); return; } 
            updateUsageDisplay(res.newRemaining); renderCards(res.data);
        }

        function renderCards(restaurants) {
            document.getElementById('main-ui').classList.add('blur-mode');
            const stack = document.getElementById('card-stack'); stack.innerHTML = '';
            document.getElementById('swiper-overlay').style.display = 'flex';
            currentLikedList = []; swipedCount = 0; cardsRemaining = restaurants.length;
            document.getElementById('round-info').innerText = "左右滑動篩選";
            restaurants.forEach((res) => {
                const wrapper = document.createElement('div'); wrapper.className = 'swipe-card-wrapper';
                const card = document.createElement('div'); card.className = 'swipe-card';
                
                // 地圖連結強化：同時搜尋店名與地址，增加 Google Maps 的成功率
                const searchQuery = encodeURIComponent(`${res.name} ${res.address}`);
                
                card.innerHTML = `<div class="swipe-hints"><div class="hint-item">← NOPE</div><div class="hint-item">LIKE →</div></div><div class="swipe-label label-like">LIKE</div><div class="swipe-label label-nope">NOPE</div><div class="label-chosen">🏆 最終首選</div><h3>${res.name}</h3><div class="card-badges"><span class="card-badge badge-rating">⭐ ${res.rating}</span><span class="card-badge badge-price">💰 ${res.price}</span></div><div class="info-row"><span class="info-label">🕒 營業</span><span>${res.hours}</span></div><div class="info-row"><span class="info-label">🔥 招牌</span><span>${res.signature}</span></div><div class="card-summary">"${res.review_summary}"</div><div class="info-row" style="opacity:0.6; font-size:0.75rem;">📍 ${res.address}</div><a class="card-map-btn" href="https://www.google.com/maps/search/?api=1&query=${searchQuery}" target="_blank">🗺️ Google 地圖</a>`;
                wrapper.appendChild(card); stack.appendChild(wrapper); initSwipe(card, wrapper, res, restaurants.length === 1);
            });
            stack.scrollTo(0, 0); 
        }

        function initSwipe(el, wrapper, resData, isLastOne) {
            let startX, moveX = 0; let isDone = false;
            const likeLabel = el.querySelector('.label-like'); const nopeLabel = el.querySelector('.label-nope');
            el.addEventListener('touchstart', (e) => { if (isDone || e.target.tagName === 'A') return; startX = e.touches[0].clientX; el.style.transition = 'none'; }, {passive: true});
            el.addEventListener('touchmove', (e) => { if (isDone || !startX) return; moveX = e.touches[0].clientX - startX; if(Math.abs(moveX) > 10) { el.style.transform = `translateX(${moveX}px) rotate(${moveX/20}deg)`; likeLabel.style.opacity = moveX > 0 ? Math.min(moveX / 100, 1) : 0; nopeLabel.style.opacity = moveX < 0 ? Math.min(Math.abs(moveX) / 100, 1) : 0; } }, {passive: false});
            el.addEventListener('touchend', () => { 
                if (isDone || !startX) return; el.style.transition = '0.4s ease'; 
                if (Math.abs(moveX) > 100) { 
                    const dir = moveX > 0 ? 1 : -1; 
                    if (isLastOne && dir === -1) { el.style.transform = `translateX(-150%)`; setTimeout(() => { alert("重新探索吧！"); resetUI(); }, 300); } 
                    else if (dir === 1 && isLastOne) { el.style.transform = 'translateX(0)'; likeLabel.style.opacity = 0; nopeLabel.style.opacity = 0; const stamp = el.querySelector('.label-chosen'); if(stamp) stamp.classList.add('active'); document.getElementById('round-info').innerText = "🏆 您的最佳首選"; isDone = true; } 
                    else { if (dir === 1) currentLikedList.push(resData); finishSwipe(el, wrapper, dir); }
                } else { el.style.transform = 'translateX(0) rotate(0deg)'; likeLabel.style.opacity = 0; nopeLabel.style.opacity = 0; } startX = null; 
            });
        }
        function finishSwipe(el, wrapper, dir) { el.style.transform = `translateX(${dir * 150}%)`; el.style.opacity = '0'; setTimeout(() => { wrapper.remove(); swipedCount++; if(swipedCount === cardsRemaining) { if(currentLikedList.length > 0) { roundCounter++; renderCards(currentLikedList); } else { alert("重新探索吧！"); resetUI(); } } }, 300); }
        function resetUI() { document.getElementById('swiper-overlay').style.display = 'none'; document.getElementById('main-ui').classList.remove('blur-mode'); roundCounter = 1; }
        document.addEventListener('touchmove', function(e) { const stack = document.getElementById('card-stack'); const overlay = document.getElementById('swiper-overlay'); if (overlay.style.display === 'flex') { if (stack.contains(e.target)) { if (stack.scrollHeight > stack.clientHeight) return; } } e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
